schema_name: chamber_note_parser
model: gpt-4.1-mini-2025-04-14
temperature: 0.7
response_format: JSON

# ─────────────────────────────────────────────
# CREDENTIALS
# ─────────────────────────────────────────────

ai_credentials:
  provider_name: OpenAI
  provider: OpenAI
  model: gpt-4.1-mini-2025-04-14
  base_url: https://api.openai.com/v1
  max_tokens: 8000
  temperature: 0.2
  response_format: JSON
  api_key: YOUR_OPENAI_API_KEY  # Replace with your OpenAI API key

sse_credentials:
  name: Desktop
  token: YOUR_SSE_TOKEN  # Replace with your Ledgyx SSE token

prompt_template: |
  You are a Dubai Chamber innovation application scoring engine.

  Your task: evaluate startup applications for the Dubai Chamber
  AI Challenge and return a strictly valid UTF-8 JSON object
  following the schema below.

  Score each dimension based on the application data provided.
  Be concise. Return JSON only — no markdown, no explanation.

  Use %s as a placeholder for input data.

user_prompt: |
  Score this startup application for Dubai Chamber:

  Company: {{company}}
  Sector: {{sector}}
  Stage: {{stage}}
  Region: {{region}}
  Description: {{description}}
  DESC compliance: {{desc_compliance}}
  Timeline: {{timeline_to_market}}

json_schema:
  type: object
  required:
    - application
    - total_score
    - relevance_score
    - feasibility_score
    - compliance_score
    - completeness_score
    - summary
    - recommendation
  properties:
    application:
      type: object
      properties:
        company:
          type: string
        sector:
          type: string
        stage:
          type: string
        region:
          type: string
        description:
          type: string
        desc_compliance:
          type: string
        timeline_to_market:
          type: string
    total_score:
      type: number
      minimum: 0
      maximum: 100
    relevance_score:
      type: number
      minimum: 0
      maximum: 30
    feasibility_score:
      type: number
      minimum: 0
      maximum: 25
    compliance_score:
      type: number
      minimum: 0
      maximum: 25
    completeness_score:
      type: number
      minimum: 0
      maximum: 20
    summary:
      type: string
    recommendation:
      type: string
      enum:
        - shortlist
        - review
        - reject

# ─────────────────────────────────────────────
# EVENTS
# ─────────────────────────────────────────────

events:
  - name: Chamber Application
    identity: chaber_application
    method: POST
    query: |
      select call(AI_CHAT_COMPLETION "OpenAI" AI_SCHEMAS "chamber_note_parser"
      FROM (select &_ as message type object) NEXT "send_chamber_report" POST) as res
      type object;

  - name: Send Chamber Report
    identity: send_chamber_report
    method: POST
    query: |
      select call(SSE_SEND "Desktop" FROM (
        select render("Title Score this startup application for Dubai Chamber:
       - Company: {{application.company}}
       - Sector: {{application.sector}}
       - Stage: {{application.stage}}
       - Region: {{application.region}}
       - Description: {{application.description}}
       - DESC compliance: {{application.desc_compliance}}
      # Metrics
      ---
       - Total Score: {{total_score}}
       - Recommendation: {{recommendation}}
       - Relevance Score: {{relevance_score}}
       - Compliance Score: {{compliance_score}}
       - Feasibility Score: {{feasibility_score}}
       - Completeness Score: {{completeness_score}}
      tag {{application.stage}}
      tag {{application.sector}}
      Timeline: {{application.timeline_to_market}}",&result) as message type object
      )) as res
      type object;

# ─────────────────────────────────────────────
# ENDPOINT
# ─────────────────────────────────────────────

endpoint:
  path: chamber/application
  handler: chaber_application

# ─────────────────────────────────────────────
# EXAMPLE REQUEST & RESPONSE
# ─────────────────────────────────────────────

example_request:
  company: NovaMed AI
  sector: HealthTech
  stage: MVP
  region: UAE
  description: >
    AI-powered triage system for hospital emergency departments.
    Reduces patient wait times by 40% using real-time symptom
    analysis and priority scoring.
  desc_compliance: Deployed on AWS UAE region. All data remains within UAE borders.
  timeline_to_market: 6 months

example_response:
  application:
    company: NovaMed AI
    sector: HealthTech
    stage: MVP
    region: UAE
    description: AI-powered triage system for hospital emergency departments...
    desc_compliance: Deployed on AWS UAE region. All data remains within UAE borders.
    timeline_to_market: 6 months
  total_score: 82
  relevance_score: 26
  feasibility_score: 20
  compliance_score: 21
  completeness_score: 15
  summary: >
    Strong HealthTech solution with clear UAE market focus and realistic timeline.
    DESC alignment demonstrated through UAE data residency commitment.
  recommendation: shortlist
